name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install & build
        working-directory: web
        env:
          VITE_FIREBASE_API_KEY: AIzaSyA-3aRyouBJxo1zf9VJh3ZVTANp5OOimYI
          VITE_FIREBASE_AUTH_DOMAIN: raidsim-online.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: raidsim-online
          VITE_FIREBASE_STORAGE_BUCKET: raidsim-online.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "101518243281"
          VITE_FIREBASE_APP_ID: 1:101518243281:web:ee83a6accfd7b4b0fe1cf0
          VITE_FIREBASE_MEASUREMENT_ID: G-8T1LBN9MSS
        run: |
          npm ci
          npm run build:pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
